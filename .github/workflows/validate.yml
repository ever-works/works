name: Validate catalog

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: node scripts/validate.mjs
